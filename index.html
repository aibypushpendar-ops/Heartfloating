<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Urgent Check This \ud83d\udc8c</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --pink:  #ff4d8d;
      --deep:  #c0005a;
      --white: #fff9fc;
      --dark:  #2a0a18;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #ffe6f0 0%, #ffc2d4 40%, #ffaac6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Lato', sans-serif;
      overflow: hidden;
    }

    /* \u2500\u2500 Petal rain \u2500\u2500 */
    .petal {
      position: fixed;
      top: -40px;
      font-size: 1.4rem;
      opacity: 0;
      pointer-events: none;
      animation: petalFall linear infinite;
      z-index: 0;
    }
    @keyframes petalFall {
      0%   { transform: translateY(0) rotate(0deg) scale(.8); opacity: 0; }
      8%   { opacity: .9; }
      90%  { opacity: .6; }
      100% { transform: translateY(110vh) rotate(360deg) scale(1.1); opacity: 0; }
    }

    /* \u2500\u2500 Card \u2500\u2500 */
    .card {
      position: relative;
      z-index: 10;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(18px);
      border: 1.5px solid rgba(255,100,160,0.35);
      border-radius: 28px;
      padding: 52px 48px 44px;
      max-width: 520px;
      width: 90vw;
      text-align: center;
      box-shadow: 0 20px 60px rgba(200,0,80,0.18), 0 4px 20px rgba(200,0,80,0.1);
      animation: cardIn .9s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(40px) scale(.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .envelope {
      font-size: 3.2rem;
      display: block;
      margin-bottom: 6px;
      animation: wobble 3s ease-in-out infinite;
    }
    @keyframes wobble {
      0%,100% { transform: rotate(-4deg) scale(1); }
      50%     { transform: rotate(4deg) scale(1.08); }
    }

    .quote {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(1rem, 2.5vw, 1.18rem);
      color: #8b2252;
      line-height: 1.75;
      margin: 18px 0 28px;
      padding: 0 8px;
    }
    .quote::before { content: '\201C'; font-size: 2.5rem; line-height: 0; vertical-align: -0.5em; color: var(--pink); margin-right: 2px; }
    .quote::after  { content: '\201D'; font-size: 2.5rem; line-height: 0; vertical-align: -0.5em; color: var(--pink); margin-left: 2px; }

    .divider {
      width: 60px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--pink), transparent);
      margin: 0 auto 28px;
      border-radius: 2px;
    }

    .question {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.3rem, 4vw, 1.85rem);
      color: var(--dark);
      margin-bottom: 36px;
      line-height: 1.4;
    }

    /* \u2500\u2500 Button row \u2500\u2500 */
    .btn-row {
      display: flex;
      gap: 20px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 14px 40px;
      border: none;
      border-radius: 50px;
      font-size: 1.1rem;
      font-family: 'Lato', sans-serif;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .5px;
    }

    /* Yes \u2014 stays in flow */
    .btn-yes {
      background: linear-gradient(135deg, #ff4d8d, #e0005c);
      color: #fff;
      box-shadow: 0 6px 24px rgba(224,0,92,.35);
      transition: transform .15s, box-shadow .15s;
    }
    .btn-yes:hover {
      transform: scale(1.07);
      box-shadow: 0 10px 30px rgba(224,0,92,.45);
    }
    .btn-yes:active { transform: scale(.97); }

    /* No \u2014 starts in flow, turns fixed only after first hover */
    .btn-no {
      background: #fff;
      color: var(--pink);
      border: 2px solid var(--pink);
      transition: none;
    }

    .btn-no.is-running {
      position: fixed;
      z-index: 999;
      transition: left .22s cubic-bezier(.22,1,.36,1), top .22s cubic-bezier(.22,1,.36,1);
    }

    /* \u2500\u2500 Placeholder keeps layout stable after No goes fixed \u2500\u2500 */
    #noPlaceholder {
      display: none;
      width: 130px;
      height: 52px;
    }

    /* \u2500\u2500 Result \u2500\u2500 */
    .result {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      animation: fadeIn .6s ease both;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(.9); }
      to   { opacity: 1; transform: scale(1); }
    }
    .result-emoji { font-size: 5rem; animation: heartbeat 1.1s ease-in-out infinite; }
    @keyframes heartbeat {
      0%,100% { transform: scale(1); }
      14%     { transform: scale(1.22); }
      28%     { transform: scale(1); }
      42%     { transform: scale(1.14); }
    }
    .result-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      color: var(--deep);
      line-height: 1.35;
    }
